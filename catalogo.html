<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Catálogo - UniRent</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header>
  <div class="logo">UniRent</div>
  <nav>
    <a href="index.html">Home</a>
    <a href="catalogo.html">Catálogo</a>
    <a href="reservas.html">Reservas</a>
    <a href="manutencao.html">Manutenção</a>
  </nav>
</header>

<section class="catalogo-container">
  <h1>Catálogo de Eletrodomésticos</h1>

  <div class="filters-container">
    <input type="text" id="searchInput" placeholder="Pesquisar equipamento...">
    
    <select id="tipoFilter">
      <option value="">Todos os Tipos</option>
    </select>

    <input type="number" id="precoMax" placeholder="Preço máximo (€)">
    
    <input type="number" id="duracaoMin" placeholder="Duração mínima (meses)">

    <button id="clearFilters">Limpar Filtros</button>
  </div>

  <div id="productsContainer" class="products-grid"></div>
</section>

<script src="js/products.js"></script>
<script src="js/storage.js"></script>
<script src="js/catalogo.js"></script>

</body>
</html>
