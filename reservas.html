<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reservas - UniRent</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header>
  <div class="logo">UniRent</div>
  <nav>
    <a href="index.html">Home</a>
    <a href="catalogo.html">Catálogo</a>
    <a href="reservas.html">Reservas</a>
    <a href="manutencao.html">Manutenção</a>
  </nav>
</header>

<section class="reservas-container">
  <h1>As Minhas Reservas</h1>

  <div id="reservasLista"></div>

  <!-- Modal de Prolongamento -->
  <div id="modalProlongar" class="modal" style="display:none;">
    <div class="modal-content">
      <h2>Prolongar Aluguer</h2>
      <div id="formProlongar">
        <p><strong>Equipamento:</strong> <span id="pNome">-</span></p>
        <p><strong>Fim Atual:</strong> <span id="pDataFimAtual">-</span></p>
        <div class="form-group">
          <label for="pNovaDataFim">Nova Data de Fim:</label>
          <input type="date" id="pNovaDataFim">
        </div>
        <div id="pResumo" class="price-summary" style="margin-top: 1rem;">
          <p>Preço Atualizado: <span id="pPrecoTotal">-</span>€</p>
        </div>
      </div>
      <div class="modal-actions" style="margin-top: 1rem; display: flex; gap: 1rem;">
        <button id="btnConfirmarProlongar" class="btn">Confirmar</button>
        <button id="btnCancelarProlongar" class="btn btn-secondary">Voltar</button>
      </div>
    </div>
  </div>

  <!-- Modal de Recolha -->
  <div id="modalRecolha" class="modal" style="display:none;">
    <div class="modal-content">
      <h2>Pedir Recolha</h2>
      <p>Escolha uma data para a recolha do equipamento:</p>
      <div class="form-group">
        <label for="dataRecolhaInput">Data de Recolha:</label>
        <input type="date" id="dataRecolhaInput">
      </div>
      <div class="modal-actions" style="margin-top: 1rem; display: flex; gap: 1rem;">
        <button id="btnConfirmarRecolha" class="btn">Agendar Recolha</button>
        <button id="btnCancelarRecolha" class="btn btn-secondary">Voltar</button>
      </div>
    </div>
  </div>
</section>

<script src="js/storage.js"></script>
<script src="js/reservas.js"></script>

</body>
</html>
